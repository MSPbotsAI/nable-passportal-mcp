services:
  nable-passportal-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: nable-passportal-mcp:latest
    container_name: nable-passportal-mcp-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - MCP_TRANSPORT=http
      - MCP_HTTP_PORT=8080
      - AUTH_MODE=${AUTH_MODE:-gateway}
    # Health check is inherited from the Dockerfile HEALTHCHECK (curl-based).

volumes: {}
